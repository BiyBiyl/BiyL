<title>BiyL - Programmer Pemula</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
background:#0f0f0f;
color:white;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

#particles{
position:fixed;
width:100%;
height:100%;
background:#0f0f0f;
z-index:-1;
}

.container{
text-align:center;
max-width:420px;
width:90%;
padding:40px;ackground:rgba(255,255,255,0.03);
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.1);
animation:slideIn 0.6s ease-out;
}

@keyframes slideIn {
from {
opacity:0;
transform:translateY(20px);
}
to {
opacity:1;
transform:translateY(0);
}
}

.profile{
margin-bottom:20px;
}

.profile img{
width:120px;
height:120px;
border-radius:50%;
border:4px solid #5865F2;
box-shadow:0 0 20px #5865F2;
transition:0.3s;
object-fit:cover;
}

.profile img:hover{
transform:scale(1.05);
box-shadow:0 0 30px #5865F2;
}

h1{
margin-top:15px;
font-size:30px;
font-weight:600;
letter-spacing:1px;
}

.bio{
margin-top:10px;
color:#aaa;
font-size:15px;
height:20px;
min-height:20px;
}

.links{
margin-top:25px;
display:flex;
flex-direction:column;
gap:10px;
}

.links a{
display:block;
text-decoration:none;
color:white;
background:#1f1f1f;
padding:15px 20px;
border-radius:12px;
transition:all 0.3s ease;
font-size:17px;
border:1px solid #333;
cursor:pointer;
font-weight:500;
}

.links a:hover{
background:#5865F2;
transform:translateY(-3px) scale(1.03);
box-shadow:0 0 15px #5865F2;
border-color:#5865F2;
}

.links a:active{
transform:translateY(-1px);
}

.footer{
margin-top:25px;
font-size:13px;
color:#666;
border-top:1px solid #333;
padding-top:15px;
}

@media (max-width:480px){
.container{
padding:30px 20px;
max-width:100%;

h1{

.profile img{
width:100px;
height:100px;

.links a{

<body>

</div>

<script>

/* typing effect */

const text = "Programmer Pemula | Future Developer";
let i = 0;

function typing(){
if(i < text.length){
document.getElementById("typing").innerHTML += text.charAt(i);
i++;
setTimeout(typing,50);
}
}

typing();


/* particles background */

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particlesArray = [];

for(let i=0;i<80;i++){
particlesArray.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speedY:Math.random()*0.5
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particlesArray.forEach(p=>{
p.y+=p.speedY;

if(p.y > canvas.height){
p.y = 0;
p.x = Math.random()*canvas.width;
}

ctx.fillStyle="white";
ctx.fillRect(p.x,p.y,p.size,p.size);
});

requestAnimationFrame(animate);
}

animate();

/* responsive canvas */
window.addEventListener('resize', ()=>{
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
});

</script>

</body>
