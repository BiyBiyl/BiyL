<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BiyL</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#0f0f0f;
color:white;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

#particles{
position:fixed;
width:100%;
height:100%;
background:#0f0f0f;
z-index:-1;
}

.container{
text-align:center;
max-width:420px;
width:90%;
padding:40px;
background:rgba(255,255,255,0.03);
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(0,0,0,0.6);
}

.profile img{
width:120px;
height:120px;
border-radius:50%;
border:4px solid #5865F2;
box-shadow:0 0 20px #5865F2;
}

h1{
margin-top:15px;
font-size:30px;
}

.bio{
margin-top:10px;
color:#aaa;
font-size:15px;
}

.links{
margin-top:25px;
}

.links a{
display:block;
text-decoration:none;
color:white;
background:#1f1f1f;
padding:15px;
margin:10px 0;
border-radius:12px;
transition:0.3s;
font-size:17px;
border:1px solid #333;
}

.links a:hover{
background:#5865F2;
transform:translateY(-3px) scale(1.03);
box-shadow:0 0 15px #5865F2;
}

.footer{
margin-top:20px;
font-size:13px;
color:#666;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">

<div class="profile">
<img src="https://avatars.githubusercontent.com/u/9919?s=200&v=4">
<h1>BiyL</h1>
<p class="bio" id="typing"></p>
</div>

<div class="links">
<a href="https://discord.gg/jCf79R5TFM">💬 Discord</a>
<a href="https://www.instagram.com/bil_biyl/">📸 Instagram</a>
<a href="#">🎥 YouTube (Coming Soon)</a>
<a href="#">🌐 Website</a>
</div>

<div class="footer">
© 2026 BiyL
</div>

</div>

<script>

/* typing effect */

const text = "Programmer Pemula | Future Developer";
let i = 0;

function typing(){
if(i < text.length){
document.getElementById("typing").innerHTML += text.charAt(i);
i++;
setTimeout(typing,50);
}
}

typing();


/* particles background */

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particlesArray = [];

for(let i=0;i<80;i++){
particlesArray.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speedY:Math.random()*0.5
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particlesArray.forEach(p=>{
p.y+=p.speedY;

if(p.y > canvas.height){
p.y = 0;
p.x = Math.random()*canvas.width;
}

ctx.fillStyle="white";
ctx.fillRect(p.x,p.y,p.size,p.size);
});

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
