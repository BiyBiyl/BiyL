<!DOCTYPE html>
<html>
<head>
<title>BiyL</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#1a1a1a,#2b2b2b,#1a1a1a);
background-size: 400% 400%;
animation: gradientBG 10s ease infinite, fadeIn 1s ease;
color:white;
text-align:center;
padding:40px;
}

/* animasi background */

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* animasi muncul */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.profile img{
width:120px;
height:120px;
border-radius:50%;
border:4px solid white;
box-shadow:0 0 20px rgba(255,255,255,0.3);
}

h1{
margin-top:15px;
font-size:32px;
}

.bio{
color:#ccc;
margin-bottom:10px;
}

.about{
max-width:500px;
margin:20px auto;
color:#bbb;
font-size:15px;
line-height:1.6;
}

.stats{
margin:20px;
font-size:14px;
color:#aaa;
}

.links{
max-width:400px;
margin:auto;
}

.links a{
display:block;
background:#333;
color:white;
text-decoration:none;
padding:15px;
margin:10px 0;
border-radius:12px;
transition:0.3s;
font-size:18px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.links a:hover{
background:#5865F2;
transform:scale(1.05);
box-shadow:0 0 15px rgba(88,101,242,0.8);
}

.footer{
margin-top:40px;
font-size:14px;
color:#aaa;
}

/* responsive mobile */

@media(max-width:600px){

body{
padding:20px;
}

h1{
font-size:26px;
}

.links a{
font-size:16px;
padding:13px;
}

}

</style>

</head>

<body>

<div class="profile">
<img src="https://i.imgur.com/2DhmtJ4.png">
<h1>BiyL</h1>
<p class="bio">Programmer "Pemula" | Paling jago | adalah Pokoknya</p>
</div>

<div class="about">
💻 Lagi belajar Coding, Project Pertama Ya Ini  
🚀 Bismillah Tahun depan Pasti Immo
</div>

<div class="stats">
👨‍💻 Projects: 3 | 📚 Learning: Web Dev | 🚀 Status: Beginner
</div>

<div class="links">

<a href="https://discord.gg/jCf79R5TFM">💬 Discord</a>
<a href="https://www.instagram.com/bil_biyl/">📸 Instagram</a>
<a href="#">🎥 YouTube (Coming Soon)</a>
<a href="#">🌐 Website</a>

</div>

<div class="footer">
Website dibuat oleh BiyL
</div>

<!-- background music optional -->
<audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

</body>
</html>
